<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專利需求訪談機器人</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --accent3: #8b5cf6;
    --success: #10b981;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --bot-bubble: #1a2235;
    --user-bubble: #1e3a5f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-size: 15px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .header-progress {
    margin-left: auto;
    display: flex; gap: 6px; align-items: center;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }
  .step-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .step-dot.done { background: var(--success); }
  .step-label { font-size: 11px; color: var(--muted); margin-left: 4px; }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
  }
  .bot .avatar { background: linear-gradient(135deg, var(--accent), var(--accent3)); }
  .user .avatar { background: linear-gradient(135deg, #0f766e, var(--accent2)); font-size: 11px; }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
  }
  .bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2563eb44;
    border-top-right-radius: 4px;
  }
  .bubble strong { color: var(--accent2); }
  .bubble .tag {
    display: inline-block;
    background: #1e3a5f;
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin: 2px 3px;
  }

  .options-container {
    padding: 0 20px 12px 62px;
    animation: fadeIn 0.4s ease;
  }
  .options-title {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .options-grid { display: flex; flex-wrap: wrap; gap: 8px; }

  .opt-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .opt-btn:hover { border-color: var(--accent); background: #1e3a5f; transform: translateY(-1px); }
  .opt-btn.selected { border-color: var(--accent); background: #1e3a5f; color: #93c5fd; }
  .opt-btn.multi.selected { border-color: var(--accent3); background: #2e1f5e; color: #c4b5fd; }
  .opt-btn .icon { font-size: 16px; }
  .opt-btn .sub { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }

  .country-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .country-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .country-chip:hover { border-color: var(--accent2); color: var(--accent2); }
  .country-chip.selected { border-color: var(--accent2); background: #0c4a6e; color: var(--accent2); }

  .confirm-btn {
    margin-top: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border: none;
    border-radius: 10px;
    padding: 11px 24px;
    color: white;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .confirm-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .confirm-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .result-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-top: 4px;
    font-size: 13px;
    line-height: 1.8;
  }
  .result-section { margin-bottom: 14px; }
  .result-section:last-child { margin-bottom: 0; }
  .result-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .result-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .keyword-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
  .kw-chip {
    background: #0c2545;
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: #93c5fd;
  }
  .kw-chip.en { border-color: var(--accent3); color: #c4b5fd; background: #1a0f35; }
  .kw-chip.ipc { border-color: var(--success); color: #6ee7b7; background: #052e16; }
  .api-section {
    background: #0a0e1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #94a3b8;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .api-section .key { color: #93c5fd; }
  .api-section .val { color: #6ee7b7; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .input-area {
    padding: 14px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .text-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    max-height: 100px;
    overflow-y: auto;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--muted); }
  .send-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 42px; height: 42px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #2563eb; }
  .restart-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
    transition: all 0.2s;
  }
  .restart-btn:hover { border-color: var(--warn); color: var(--warn); }

  /* ── Dify loading ── */
  .dify-loading {
    margin: 0 20px 16px; padding: 24px 20px; text-align: center;
    background: #1a2235; border: 1px solid #1e2d45; border-radius: 16px;
    animation: fadeIn .4s ease;
  }
  .dify-spinner {
    width: 36px; height: 36px; margin: 0 auto 14px;
    border: 3px solid #1e2d45; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .dify-loading p { font-size: 13px; color: #64748b; margin-bottom: 12px; }
  .dify-loading strong { color: #06b6d4; }
  .dify-pbar { height: 3px; background: #1e2d45; border-radius: 2px; overflow: hidden; }
  .dify-pfill {
    height: 100%; width: 0; border-radius: 2px;
    background: linear-gradient(90deg,#3b82f6,#06b6d4); transition: width .35s ease;
  }

  /* ── 專利結果卡片 ── */
  .dify-result {
    margin: 0 20px 16px; padding: 18px;
    background: #111d2e; border: 1px solid #0f6e56;
    border-radius: 16px; animation: fadeIn .5s ease;
  }
  .dify-result-hd {
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 12px; border-bottom: 1px solid #1e2d45; margin-bottom: 14px;
  }
  .dify-result-title { font-size: 14px; font-weight: 700; color: #10b981; }
  .dify-count {
    margin-left: auto; font-size: 11px; color: #64748b;
    background: #052e16; border: 1px solid #0f6e56;
    border-radius: 10px; padding: 2px 10px;
  }
  .p-card {
    background: #0a0e1a; border: 1px solid #1e2d45;
    border-radius: 10px; padding: 13px 15px; margin-bottom: 8px; transition: border-color .2s;
  }
  .p-card:hover { border-color: #3b82f6; }
  .p-num { font-family: 'JetBrains Mono',monospace; font-size: 11px; color: #06b6d4; margin-bottom: 5px; }
  .p-title { font-size: 13px; font-weight: 600; color: #e2e8f0; margin-bottom: 7px; line-height: 1.45; }
  .p-title a { color: inherit; text-decoration: none; }
  .p-title a:hover { text-decoration: underline; color: #3b82f6; }
  .p-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 7px; }
  .p-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-family: 'JetBrains Mono',monospace; }
  .p-badge.db  { background:#1e3a5f; color:#93c5fd; border:1px solid #2563eb44; }
  .p-badge.dt  { background:#1a2235; color:#64748b; border:1px solid #1e2d45; }
  .p-badge.ipc { background:#052e16; color:#6ee7b7; border:1px solid #0f6e56; }
  .p-abs { font-size: 12px; color: #94a3b8; line-height: 1.65; max-height: 58px; overflow: hidden; }
  .p-abs.open { max-height: none; }
  .p-toggle { font-size: 11px; color: #3b82f6; cursor: pointer; margin-top: 4px; display: inline-block; }
  .p-toggle:hover { text-decoration: underline; }
  .dify-rawtext { font-size: 13px; color: #94a3b8; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
  .dify-err {
    margin: 0 20px 16px; padding: 16px;
    background: #1a0a0a; border: 1px solid #7f1d1d; border-radius: 12px; animation: fadeIn .3s ease;
  }
  .dify-err-title { color: #fca5a5; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .dify-err-body  { color: #94a3b8; font-size: 12px; line-height: 1.7; }
  .dify-err-code  {
    font-family: 'JetBrains Mono',monospace; font-size: 11px;
    background: #0a0e1a; border: 1px solid #7f1d1d; border-radius: 6px;
    padding: 8px 10px; margin-top: 8px; color: #f87171; white-space: pre-wrap;
  }
  .action-row { display:flex; gap:8px; margin-top:12px; padding-top:10px; border-top:1px solid #1e2d45; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔍</div>
  <div>
    <div class="header-title">專利需求訪談機器人</div>
    <div class="header-sub">4步驟精準收斂 → 自動生成關鍵字 + API 參數</div>
  </div>
  <div class="header-progress" id="progressBar">
    <div class="step-dot active" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
    <div class="step-dot" id="dot4"></div>
    <span class="step-label" id="stepLabel">開始</span>
  </div>
  <button class="restart-btn" onclick="restartBot()">↺ 重新開始</button>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <textarea class="text-input" id="userInput" placeholder="輸入您的技術主題描述…" rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="handleSend()">↑</button>
</div>

<script>
const STATE = {
  step: 0, awaitingFreeText: false,
  answers: { topic:'', domain:'', subDomains:[], countries:[], marketFocus:[], purpose:[], usage:[] }
};

const WIPO_DOMAINS = [
  { id:'electrical', label:'電機工程', icon:'⚡' },
  { id:'instruments', label:'器械', icon:'🔬' },
  { id:'chemistry', label:'化學', icon:'⚗️' },
  { id:'mechanical', label:'機械', icon:'⚙️' },
  { id:'other', label:'其他領域', icon:'📦' },
];
const WIPO_SUBS = {
  electrical: ['電子機械/能源','音頻/視頻技術','遠程通信','數字通信','基本通信程序','電腦技術','電子商務','半導體'],
  instruments: ['光學','測量','生物材料分析','機械控制','醫療技術'],
  chemistry: ['有機精密化學','生物技術','醫藥','高分子化學/高分子','食品','基礎材料化學','材料/金屬學','表面技術/塗層','微觀結構/納米技術','化學工程','環境技術'],
  mechanical: ['機械操作','工具機械','發動機/泵/渦輪','纖維/造紙機','其他特殊機械','熱處理/裝置','機械元件','運輸'],
  other: ['家具/遊戲','其他消費品','土木工程']
};
const COUNTRIES = [
  {code:'US',label:'🇺🇸 美國 USPTO',db:'USPTO'},
  {code:'EP',label:'🇪🇺 歐洲 EPO',db:'EPO'},
  {code:'TW',label:'🇹🇼 台灣 TIPO',db:'TIPO'},
  {code:'CN',label:'🇨🇳 中國 CNIPA',db:'CNIPA'},
  {code:'JP',label:'🇯🇵 日本 JPO',db:'J-PlatPat'},
  {code:'KR',label:'🇰🇷 韓國 KIPO',db:'KIPRIS'},
  {code:'DE',label:'🇩🇪 德國 DPMA',db:'DPMA'},
  {code:'WO',label:'🌐 PCT 國際',db:'WIPO PCT'},
];
const MARKETS = [
  {id:'b2b',label:'B2B 企業市場',icon:'🏢'},
  {id:'b2c',label:'B2C 消費市場',icon:'🛍️'},
  {id:'gov',label:'政府/公共建設',icon:'🏛️'},
  {id:'medical',label:'醫療/生技',icon:'🏥'},
  {id:'industrial',label:'工業/製造',icon:'🏭'},
  {id:'digital',label:'數位/軟體服務',icon:'💻'},
];
const PURPOSES = [
  {id:'innovation',label:'技術創新',icon:'💡',sub:'突破現有技術限制'},
  {id:'improvement',label:'設備改善',icon:'🔧',sub:'提升現有裝置效能'},
  {id:'protection',label:'技術保護',icon:'🛡️',sub:'防禦競爭者模仿'},
  {id:'standard',label:'標準制定',icon:'📐',sub:'制定行業技術標準'},
];
const USAGES = [
  {id:'market',label:'市場分析',icon:'📊',sub:'分析技術市場規模趨勢'},
  {id:'competition',label:'競品攻防',icon:'⚔️',sub:'分析競爭對手專利布局'},
  {id:'layout',label:'技術佈局',icon:'🗺️',sub:'規劃自身專利護城河'},
  {id:'freedom',label:'自由實施分析',icon:'🔓',sub:'FTO / 迴避設計研究'},
];

function addMsg(type, html) {
  const chat = document.getElementById('chatArea');
  const w = document.createElement('div'); w.className = `msg ${type}`;
  const av = document.createElement('div'); av.className = 'avatar'; av.textContent = type==='bot'?'🤖':'我';
  const bb = document.createElement('div'); bb.className = 'bubble'; bb.innerHTML = html;
  w.appendChild(av); w.appendChild(bb); chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight; return w;
}

function addOptions(title, html) {
  const chat = document.getElementById('chatArea');
  const d = document.createElement('div'); d.className = 'options-container'; d.id = 'currentOptions';
  d.innerHTML = `<div class="options-title">${title}</div>${html}`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function removeOptions() { const e = document.getElementById('currentOptions'); if(e) e.remove(); }

function showTyping() {
  const chat = document.getElementById('chatArea');
  const d = document.createElement('div'); d.className = 'msg bot'; d.id = 'typingIndicator';
  d.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { const e = document.getElementById('typingIndicator'); if(e) e.remove(); }
const delay = ms => new Promise(r => setTimeout(r, ms));

function updateProgress(step) {
  for(let i=0;i<=4;i++){
    const d = document.getElementById(`dot${i}`);
    d.className = i<step?'step-dot done':i===step?'step-dot active':'step-dot';
  }
  document.getElementById('stepLabel').textContent = ['開始','領域','國家','目的','用途','完成'][step]||'完成';
}

async function startBot() {
  await delay(400); showTyping(); await delay(900); hideTyping();
  addMsg('bot',`嗨！我是您的<strong>專利需求訪談助手</strong> 🔍<br><br>
    我會透過 <strong>4個維度</strong> 了解您的需求，再自動生成精準關鍵字與 API 搜尋參數。<br><br>
    首先，請描述：<strong>您這次想要檢索的技術主題是什麼？</strong><br>
    <span style="color:var(--muted);font-size:12px">例如：「鋰電池快速充電方法」、「無線感測器網路節能技術」</span>`);
  STATE.awaitingFreeText = true; STATE.step = 0;
}

async function stepDomain() {
  STATE.step = 1; updateProgress(1);
  showTyping(); await delay(700); hideTyping();
  addMsg('bot',`收到「<strong>${STATE.answers.topic}</strong>」✅<br><br>
    <strong>步驟 1 / 4 — 技術領域</strong><br>
    請選擇 WIPO 主技術領域（單選），決定 IPC 方向：`);
  const btns = WIPO_DOMAINS.map(d=>`<button class="opt-btn" onclick="selectDomain('${d.id}',this)"><span class="icon">${d.icon}</span>${d.label}</button>`).join('');
  addOptions('WIPO 主技術領域（單選）',`<div class="options-grid">${btns}</div>`);
  STATE.awaitingFreeText = false;
}

function selectDomain(id, btn) {
  document.querySelectorAll('#currentOptions .opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); STATE.answers.domain = id; STATE.answers.subDomains = [];
  const existing = document.getElementById('subSection'); if(existing) existing.remove();
  const subs = WIPO_SUBS[id]||[];
  const subDiv = document.createElement('div'); subDiv.id = 'subSection'; subDiv.style.marginTop='10px';

function generateKeywords(ans) {
  const stop = ['的','了','是','在','和','與','及','或','將','能','可以','使用','一種','方法','系統','裝置'];
  const zhWords = ans.topic.split(/[\s,，、。]/g).map(w=>w.trim()).filter(w=>w.length>=2&&!stop.includes(w));
  const zhBase = [...new Set(zhWords)].slice(0,6);
  const domKW = {
    electrical:{zh:['電路','控制器','感測器','訊號處理','微處理器'],en:['circuit','controller','sensor','signal processing','microprocessor','embedded system']},
    instruments:{zh:['量測裝置','光學元件','生醫感測','精密儀器'],en:['measurement device','optical component','biosensor','precision instrument','calibration']},
    chemistry:{zh:['反應機制','合成方法','催化劑','配方組合物'],en:['reaction mechanism','synthesis method','catalyst','formulation','compound']},
    mechanical:{zh:['機構設計','驅動系統','機械結構','傳動元件'],en:['mechanism design','drive system','mechanical structure','transmission','actuator']},
    other:{zh:['產品設計','使用者介面','結構改良'],en:['product design','user interface','structural improvement']},
  };
  const dkw = domKW[ans.domain]||domKW.other;
  const purKW = {innovation:['novel method','new approach'],improvement:['improved device','optimization'],protection:['defensive patent'],standard:['standardization','standard protocol']};
  const useKW = {market:['market application','commercial use'],competition:['competitive analysis','prior art'],layout:['patent portfolio','technology layout'],freedom:['freedom to operate','FTO','design around']};
  const enBase = [...dkw.en.slice(0,4)];
  ans.purpose.forEach(p=>{if(purKW[p]) enBase.push(...purKW[p]);});
  ans.usage.forEach(u=>{if(useKW[u]) enBase.push(...useKW[u]);});
  const zhMap = {'電池':'battery','充電':'charging','快速':'fast','鋰':'lithium','馬達':'motor','感測':'sensing','無線':'wireless','通訊':'communication','晶片':'chip','冷卻':'cooling','結構':'structure','材料':'material','塗層':'coating','機器人':'robotics','影像':'image','辨識':'recognition','人工智慧':'artificial intelligence','學習':'machine learning','模型':'model','節能':'energy saving','散熱':'thermal management'};
  const topicEn = [];
  Object.entries(zhMap).forEach(([zh,en])=>{if(ans.topic.includes(zh)) topicEn.push(en);});
  const allEn = [...new Set([...topicEn,...enBase])].slice(0,12);
  const allZh = [...new Set([...zhBase,...dkw.zh])].slice(0,10);
  const main = allEn.slice(0,3).map(k=>`"${k}"`).join(' OR ');
  const sub = allEn.slice(3,6).map(k=>`"${k}"`).join(' OR ');
  return {zh:allZh, en:allEn, searchStr:`(${main}) AND (${sub||'"method" OR "device"'})`};
}

function getIPC(domain, subs) {
  const base = {electrical:['H02J 7/00','H02M 3/00','G06F 1/26','H04L 1/00'],instruments:['G01N 21/00','G02B 1/00','A61B 5/00','G05B 19/00'],chemistry:['C07C 1/00','C12N 15/00','A61K 31/00','C08G 1/00'],mechanical:['F16H 1/00','B23Q 5/00','F02B 1/00','B65G 1/00'],other:['A47B 1/00','A63F 1/00','E04B 1/00']}[domain]||['G06F 1/00'];
  const sub2ipc = {'生物技術':'C12N 5/00','醫藥':'A61P 1/00','半導體':'H01L 21/00','電腦技術':'G06F 17/00','光學':'G02B 5/00','遠程通信':'H04W 1/00','醫療技術':'A61B 1/00','測量':'G01B 1/00','運輸':'B60W 30/00','機械操作':'B25J 9/00'};
  const extra = subs.flatMap(s=>sub2ipc[s]?[sub2ipc[s]]:[]);
  return [...new Set([...base.slice(0,3),...extra.slice(0,2)])];
}

function buildParams(ans, kw, ipc) {
  return {
    databases: ans.countries.map(c=>COUNTRIES.find(x=>x.code===c)?.db||c),
    search_query: { keywords_zh: kw.zh, keywords_en: kw.en, search_string: kw.searchStr, ipc_codes: ipc },
    filters: { domain: WIPO_DOMAINS.find(d=>d.id===ans.domain)?.label, sub_domains: ans.subDomains, purpose: ans.purpose, usage: ans.usage, market_focus: ans.marketFocus },
    output: { limit: 20, sort_by: 'relevance', include_claims: true, include_abstract: true },
    session_id: `session_${Date.now()}`
  };
}

      <div class="api-section">${JSON.stringify(params,null,2).replace(/"([^"]+)":/g,'<span class="key">"$1"</span>:').replace(/: "([^"]+)"/g,': <span class="val">"$1"</span>')}</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="confirm-btn" onclick="copyParams()">📋 複製 API 參數</button>
      <button class="confirm-btn" style="background:linear-gradient(135deg,#0f766e,#06b6d4)" onclick="restartBot()">🔄 重新訪談</button>
    </div>`;
  chat.appendChild(rp); chat.scrollTop = chat.scrollHeight;
}


// ════════════════════════════════════════
//  DIFY API — 透過 Netlify Functions 安全代理
//  API Key 存放在 Netlify 環境變數，前端不可見
// ════════════════════════════════════════
async function callDify(params) {
  try {
    const userInputText = `【專利需求檢索任務】

## 技術主題
${params.filters?.domain || ''}

## 技術子領域
${(params.filters?.sub_domains || []).join('、') || '未指定'}

## 目標專利資料庫
${(params.databases || []).join('、')}

## 專利目的
${(params.filters?.purpose || []).join('、')}

## 檢索用途
${(params.filters?.usage || []).join('、')}

## 中文關鍵字
${(params.search_query?.keywords_zh || []).join(' ')}

## 英文關鍵字
${(params.search_query?.keywords_en || []).join(' ')}

## 建議搜尋字串
${params.search_query?.search_string || ''}

## 建議 IPC 代碼
${(params.search_query?.ipc_codes || []).join('、')}

## 完整 JSON 參數
\`\`\`json
${JSON.stringify(params, null, 2)}
\`\`\``;

    const body = {
      inputs: { user_input: userInputText },
      response_mode: 'blocking',
      user: 'patent-' + Date.now()
    };

    const response = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const text = await response.text();
    if (!response.ok) return { ok: false, code: 'http_' + response.status, msg: `HTTP ${response.status}`, detail: text };
    return { ok: true, data: JSON.parse(text) };
  } catch (e) {
    return { ok: false, code: 'net', msg: '請求失敗：' + e.message };
  }
}

function parseDify(data) {
  const out = data?.data?.outputs || data?.outputs || {};
  let list = out.patents || out.results || out.patent_list || out.data || [];
  if (typeof list === 'string') { try { list = JSON.parse(list); } catch(e) { list = []; } }
  if (!Array.isArray(list)) list = [];
  const raw = out.text || out.result || out.answer || out.output || '';
  return { list, raw };
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showDifyLoader(dbs) {
  const chat = document.getElementById('chatArea');
  const d = document.createElement('div');
  d.className = 'dify-loading'; d.id = 'difyLoader';
  d.innerHTML = `<div class="dify-spinner"></div>
    <p>正在透過 Netlify 代理呼叫 Dify，爬取 <strong>${esc(dbs.join(' / '))}</strong> 專利資料庫…</p>
    <div class="dify-pbar"><div class="dify-pfill" id="difyPfill"></div></div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
  let pct = 0;
  const iv = setInterval(() => {
    pct = Math.min(pct + Math.random() * 7 + 2, 88);
    const f = document.getElementById('difyPfill');
    if (f) f.style.width = pct + '%'; else clearInterval(iv);
  }, 450);
  return iv;
}

function hideDifyLoader(iv) {
  clearInterval(iv);
  const f = document.getElementById('difyPfill');
  if (f) f.style.width = '100%';
  setTimeout(() => { const d = document.getElementById('difyLoader'); if (d) d.remove(); }, 350);
}

function patentCard(p, idx) {
  const num   = p.patent_number || p.number || p.id || ('#'+(idx+1));
  const title = p.patent_title  || p.title  || p.name || '（無標題）';
  const date  = p.patent_date   || p.date   || p.filing_date || '';
  const db    = p.database || p.source || p.assignee_country || '';
  const ipc   = p.ipc || p.ipc_code || p.classification || '';
  const abs   = p.patent_abstract || p.abstract || p.summary || '';
  const url   = p.url || p.link || '';
  const tHtml = url ? `<a href="${esc(url)}" target="_blank">${esc(title)}</a>` : esc(title);
  return `<div class="p-card">
    <div class="p-num">${esc(num)}</div>
    <div class="p-title">${tHtml}</div>
    <div class="p-badges">
      ${db   ? `<span class="p-badge db">${esc(db)}</span>` : ''}
      ${date ? `<span class="p-badge dt">${esc(date)}</span>` : ''}
      ${ipc  ? `<span class="p-badge ipc">${esc(ipc)}</span>` : ''}
    </div>
    ${abs ? `<div class="p-abs" id="pa${idx}">${esc(abs)}</div>
    <span class="p-toggle" onclick="toggleAbs(${idx})">▼ 展開摘要</span>` : ''}
  </div>`;
}

function toggleAbs(i) {

}

    <button class="confirm-btn" style="font-size:12px;padding:8px 14px" onclick="copyParams()">📋 複製 JSON 參數</button>
    <button class="confirm-btn" style="font-size:12px;padding:8px 14px;background:linear-gradient(135deg,#0f766e,#06b6d4)" onclick="restartBot()">🔄 重新訪談</button>`;
  chat.appendChild(d); chat.appendChild(row); chat.scrollTop = chat.scrollHeight;
}



function copyParams() {
  navigator.clipboard.writeText(JSON.stringify(window._lastParams,null,2)).then(()=>{
    const btn = event.target; btn.textContent='✅ 已複製！';
    setTimeout(()=>btn.textContent='📋 複製 API 參數',2000);
  });
}

function handleSend() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if(!text||!STATE.awaitingFreeText) return;
  inp.value=''; autoResize(inp);
  STATE.answers.topic = text; STATE.awaitingFreeText = false;
  addMsg('user', text);
  stepDomain();
}
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function restartBot() {
  document.getElementById('chatArea').innerHTML='';
  Object.assign(STATE,{step:0,awaitingFreeText:false,answers:{topic:'',domain:'',subDomains:[],countries:[],marketFocus:[],purpose:[],usage:[]}});
  updateProgress(0); startBot();
}

startBot();
